<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1525"/>
      <stop offset="100%" stop-color="#111D35"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#00F5C8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#00D4AA" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Subtle grid lines -->
  <line x1="80" y1="160" x2="432" y2="160" stroke="#1E3A5F" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="80" y1="240" x2="432" y2="240" stroke="#1E3A5F" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="80" y1="320" x2="432" y2="320" stroke="#1E3A5F" stroke-width="1" stroke-opacity="0.3"/>
  
  <!-- Area fill under chart -->
  <path d="M80,380 L160,320 L240,340 L320,220 L400,140 L432,110 L432,400 L80,400 Z" fill="url(#glow)"/>
  
  <!-- Main chart line -->
  <polyline 
    points="80,380 160,320 240,340 320,220 400,140 432,110" 
    fill="none" 
    stroke="url(#line)" 
    stroke-width="14" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    filter="url(#shadow)"
  />
  
  <!-- Data points -->
  <circle cx="160" cy="320" r="8" fill="#0B1525" stroke="#00D4AA" stroke-width="4"/>
  <circle cx="240" cy="340" r="8" fill="#0B1525" stroke="#00D4AA" stroke-width="4"/>
  <circle cx="320" cy="220" r="8" fill="#0B1525" stroke="#00D4AA" stroke-width="4"/>
  
  <!-- End point with pulse -->
  <circle cx="432" cy="110" r="16" fill="#00D4AA" opacity="0.15"/>
  <circle cx="432" cy="110" r="10" fill="#00D4AA"/>
</svg>
